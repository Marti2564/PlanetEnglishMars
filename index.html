<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Superhero English Challenge</title>

<!-- Font arcade per titolo e nomi -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    font-family: Arial, sans-serif;
    color: white;
    margin: 0;
    padding: 0;

    /* Sfondo pixel art arcade con cache-buster automatico */
    background-image: url('https://marti2564.github.io/PlanetEnglishMars/cielo.2.jpg?v=' + new Date().getTime());
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    image-rendering: pixelated; /* mantiene effetto pixel nitido */
}

h1 {
    text-align: center;
    font-family: 'Press Start 2P', cursive; /* font arcade */
    font-size: 24px; 
    color: #006400; /* verde scuro */
    text-transform: uppercase; /* tutto in maiuscolo */
    margin-top: 20px;
    text-shadow: 2px 2px 0 #000; /* contrasto con sfondo */
}

.container {
    width: 90%;
    max-width: 600px;
    margin: 30px auto;
}

.player {
    display: flex;
    flex-direction: column;
    margin: 50px 0; /* più spazio tra righe */
}

.player-header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 10px;
}

.avatar {
    width: 80px;
    height: 80px;
    border-radius: 15%;
    border: 2px solid #38bdf8;
    object-fit: cover;
}

.name {
    font-family: 'Press Start 2P', cursive; /* stesso font del titolo */
    font-size: 20px;
    color: #006400; /* verde scuro */
    font-weight: bold;
    text-transform: uppercase; /* tutto in maiuscolo */
}

.progress-container {
    width: 100%;
    background: #1e293b;
    border-radius: 30px;
    overflow: hidden;
    border: 2px solid #38bdf8;
    height: 40px; /* barra più alta */
}

.progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #22c55e, #4ade80);
    width: 0%;
    transition: width 0.6s;
}

.minutes {
    text-align: right;
    margin-top: 5px;
    font-size: 14px;
    opacity: 0.9;
    color: #006400; /* verde scuro */
}
</style>
</head>

<body>

<h1>Superhero English Challenge</h1>

<div class="container" id="container"></div>

<script>
  const data = [
    {name: "Emilia", minutes: 690, avatar: "emilia.png"}, 
    {name: "Edoardo", minutes: 405, avatar: "edoardo.png"},
    {name: "Davide", minutes: 233, avatar: "davide.png"}
  ];

  const maxMinutes = Math.max(...data.map(p => p.minutes), 1);
  const container = document.getElementById("container");

  data.forEach(p => {
    const percent = (p.minutes / maxMinutes) * 100;

    const row = document.createElement("div");
    row.className = "player";

    row.innerHTML = `
      <div class="player-header">
        <img src="${p.avatar}" alt="${p.name}" class="avatar"
             onerror="this.onerror=null;this.src='default.png';" />
        <div class="name">${p.name}</div>
      </div>
      <div class="progress-container">
        <div class="progress-bar" style="width:${percent}%"></div>
      </div>
      <div class="minutes">${p.minutes} min</div>
    `;

    container.appendChild(row);
  });

  // Aggiornamento dinamico cache-buster per sfondo
  document.body.style.backgroundImage = "url('https://marti2564.github.io/PlanetEnglishMars/cielo.2.jpg?v=" + new Date().getTime() + "')";
</script>

</body>
</html>
